<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>私车公用轨迹记录</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="glass-dashboard" aria-label="私车公用">
        <header class="app-header">
          <h1>私车公用</h1>
        </header>

        <section class="map-panel" aria-label="地图">
          <div id="map" class="map-canvas">
          <div id="amapRoot" class="amap-root"></div>
        </div>
        <button id="fitRouteBtn" class="locate-button" title="定位" aria-label="定位" type="button">
          <span class="locate-cross" aria-hidden="true"></span>
        </button>
      </section>

        <section class="control-panel" aria-label="记录控制">
          <div class="actions-row">
            <button id="trackToggleBtn" class="primary-button" type="button">
              <span id="trackingBadge" class="track-state">开始</span>
              <span id="locationState" class="track-info"></span>
            </button>
          </div>
          <div class="secondary-actions">
            <button id="settingsBtn" type="button">设置</button>
            <button id="historyBtn" type="button">历史记录</button>
          </div>
        </section>
      </section>

      <dialog id="settingsDialog" class="settings-dialog" aria-label="设置">
        <form method="dialog" class="settings-card">
          <div class="dialog-heading">
            <strong>设置</strong>
            <button id="closeSettingsBtn" class="icon-button" value="cancel" title="关闭" type="submit">×</button>
          </div>
          <label class="rate-field">
            补贴单价
            <span>
              <input id="rateInput" type="number" min="0" step="0.01" inputmode="decimal" />
              元/公里
            </span>
          </label>
          <button id="saveSettingsBtn" class="primary-button" value="default" type="submit">保存</button>
        </form>
      </dialog>

      <dialog id="historyDialog" class="history-dialog" aria-label="历史记录">
        <div id="history" class="history-panel">
          <div class="section-heading">
            <div>
              <h1>历史记录</h1>
              <p>筛选、回溯轨迹，并导出报销数据。</p>
            </div>
            <button id="closeHistoryBtn" class="icon-button" title="关闭" type="button">×</button>
          </div>

          <div class="history-tools">
            <div class="filters">
              <label>
                起始日期
                <input id="fromDate" type="date" />
              </label>
              <label>
                结束日期
                <input id="toDate" type="date" />
              </label>
            </div>
          </div>

          <div id="historyList" class="history-list"></div>
        </div>
      </dialog>
    </main>

    <template id="recordTemplate">
      <article class="record-card">
        <img class="record-shot" alt="轨迹截图" />
        <div class="record-body">
          <div class="record-title">
            <strong class="record-date"></strong>
            <span class="record-amount"></span>
          </div>
          <div class="record-meta"></div>
          <textarea class="record-note" rows="2" placeholder="添加备注"></textarea>
          <div class="record-actions">
            <button class="replay-btn" type="button">回放</button>
            <button class="delete-btn" type="button">删除</button>
          </div>
        </div>
      </article>
    </template>

    <script src="./config.local.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
